name: Monitor de Vagas de IA

on:
  schedule:
    - cron: '0 * * * *' # Roda de hora em hora
  workflow_dispatch: # Permite que voce de o play manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixando o codigo
        uses: actions/checkout@v3

      - name: Instalando o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalando as bibliotecas
        run: pip install -r requirements.txt

      - name: Executando o Olheiro
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python olheiro.py
